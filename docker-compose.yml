services:
  db:
    profiles: ["docker-db"]
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-nbeauty_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nbeauty_dev_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      # Versioned volume name forces a clean local cluster after schema resets.
      - db_data_v3:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql+asyncpg://nbeauty_app:app_password@host.docker.internal:5432/postgres}
    ports:
      - "8000:8000"

  bot:
    build:
      context: .
      dockerfile: ./bot/Dockerfile
    command: ["python", "-m", "bot.main"]
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql+asyncpg://nbeauty_app:app_password@host.docker.internal:5432/postgres}

volumes:
  db_data_v3:
