version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: nbeauty
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "8000:8000"

  bot:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    command: ["python", "-m", "bot.main"]
    env_file:
      - .env
    depends_on:
      - db

volumes:
  db_data:
